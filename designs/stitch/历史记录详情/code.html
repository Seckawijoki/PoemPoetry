<script>
        // Micro-interaction: Ink bleed effect on card click
        document.querySelectorAll('.parchment-card').forEach(card => {
            card.addEventListener('mousedown', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const ripple = document.createElement('div');
                ripple.style.position = 'absolute';
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                ripple.style.width = '2px';
                ripple.style.height = '2px';
                ripple.style.background = 'rgba(118, 21, 25, 0.1)';
                ripple.style.borderRadius = '50%';
                ripple.style.transform = 'scale(0)';
                ripple.style.transition = 'transform 0.6s ease-out, opacity 0.6s ease-out';
                ripple.style.pointerEvents = 'none';
                
                this.appendChild(ripple);
                
                requestAnimationFrame(() => {
                    ripple.style.transform = 'scale(200)';
                    ripple.style.opacity = '0';
                });
                
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
