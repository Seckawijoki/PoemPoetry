<script>
        const charPool = "床前明月光疑是地上霜举头望明月低头思故乡春眠不觉晓处处闻啼鸟夜来风雨声花落知多少国破山河在城春草木深感时花溅泪恨别鸟惊心";
        const gridElement = document.getElementById('game-grid');
        const rows = 12;
        const cols = 10;
        let isSelecting = false;
        let selectedCells = [];

        function initGrid() {
            gridElement.innerHTML = '';
            for (let i = 0; i < rows * cols; i++) {
                const char = charPool[Math.floor(Math.random() * charPool.length)];
                const cell = document.createElement('div');
                cell.className = "grid-char-box cursor-pointer hover:bg-primary/5";
                cell.innerText = char;
                cell.dataset.index = i;
                
                // Mouse Events
                cell.addEventListener('mousedown', () => startSelection(cell));
                cell.addEventListener('mouseenter', () => handleHover(cell));
                cell.addEventListener('mouseup', endSelection);
                
                // Mobile Touch Support
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    startSelection(cell);
                }, { passive: false });
                
                cell.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const target = document.elementFromPoint(touch.clientX, touch.clientY);
                    if (target && target.classList.contains('grid-char-box')) {
                        handleHover(target);
                    }
                }, { passive: false });

                cell.addEventListener('touchend', endSelection);
                
                gridElement.appendChild(cell);
            }
        }

        function startSelection(cell) {
            isSelecting = true;
            selectedCells = [cell];
            cell.classList.add('ink-bleed-active');
        }

        function handleHover(cell) {
            if (isSelecting && !selectedCells.includes(cell)) {
                selectedCells.push(cell);
                cell.classList.add('ink-bleed-active');
            }
        }

        function endSelection() {
            if (!isSelecting) return;
            isSelecting = false;
            
            const selectedText = selectedCells.map(c => c.innerText).join('');
            if (selectedText.length >= 2) {
                selectedCells.forEach(c => {
                   c.classList.remove('ink-bleed-active');
                   c.classList.add('bg-primary', 'text-white', 'border-transparent');
                });
            } else {
                selectedCells.forEach(c => c.classList.remove('ink-bleed-active'));
            }
            selectedCells = [];
        }

        // Catch end of selection outside grid
        window.addEventListener('mouseup', () => {
            if (isSelecting) endSelection();
        });

        document.getElementById('reset-btn').addEventListener('click', initGrid);
        document.getElementById('hint-btn').addEventListener('click', () => {
            const cells = document.querySelectorAll('.grid-char-box');
            const randomCell = cells[Math.floor(Math.random() * cells.length)];
            randomCell.classList.add('animate-pulse', 'ring-2', 'ring-primary');
            setTimeout(() => {
                randomCell.classList.remove('animate-pulse', 'ring-2', 'ring-primary');
            }, 1000);
        });

        initGrid();
    </script>
