<script>
        // Simple micro-interaction for the timer
        let timeLeft = 7;
        const timerText = document.getElementById('timer-seconds');
        const timerBar = document.getElementById('timer-bar');

        const countdown = setInterval(() => {
            timeLeft -= 1;
            if (timeLeft >= 0) {
                timerText.innerText = timeLeft;
                // Animate progress bar shrinkage
                timerBar.style.width = (timeLeft / 20 * 100) + '%';
            } else {
                clearInterval(countdown);
                // logic for timeout could go here
            }
        }, 1000);

        // Micro-interaction for answer selection
        const buttons = document.querySelectorAll('main button.group');
        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                // Flash effect for feedback
                this.classList.add('brightness-110');
                setTimeout(() => this.classList.remove('brightness-110'), 200);
            });
        });
    </script>
