<style>
        body {
            background-color: #fef9ea;
            /* Subtle paper texture overlay */
            background-image: url("https://www.transparenttextures.com/patterns/rice-paper.png");
            font-family: 'Noto Serif SC', serif;
        }

        .xuan-paper-card {
            background-color: #fcf8ee;
            border: 1px solid rgba(138, 113, 111, 0.15);
            position: relative;
            transition: all 0.3s ease;
        }
        
        .xuan-paper-card:hover {
            background-color: #fdfaf3;
            border-color: #761519;
        }

        /* Decorative window lattice corners */
        .lattice-corner {
            position: absolute;
            width: 8px;
            height: 8px;
            border: 1px solid #761519;
            opacity: 0.3;
        }
        .top-left { top: 4px; left: 4px; border-right: 0; border-bottom: 0; }
        .bottom-right { bottom: 4px; right: 4px; border-left: 0; border-top: 0; }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom scrollbar for classical feel */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #fef9ea;
        }
        ::-webkit-scrollbar-thumb {
            background: #761519;
            border-radius: 2px;

<body class="min-h-screen text-on-surface antialiased overflow-x-hidden">
<!-- Top AppBar (from JSON context) -->
<header class="sticky top-0 z-50 bg-background/95 backdrop-blur-sm border-b border-outline/20">
<div class="flex items-center justify-between px-margin-page py-4 w-full max-w-4xl mx-auto">

<span class="material-symbols-outlined text-[20px]">arrow_back</span>
<span class="font-title-md text-title-md">返回</span>
</button>

<button class="text-on-surface-variant hover:bg-secondary-container/50 p-2 rounded-full transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<main class="max-w-3xl mx-auto px-margin-page pt-stack-md pb-stack-lg">

<div class="inline-block relative px-6 py-2">
<div class="absolute inset-0 border-x border-primary/20 scale-y-75"></div>
<p class="font-body-md text-body-md text-on-surface-variant italic">
                    共收藏二十四首名篇
                </p>
</div>
</div>
<!-- Poems List -->
<div class="space-y-3">
<!-- Card 1 -->
<div class="xuan-paper-card p-4 group flex items-start justify-between">
<div class="lattice-corner top-left"></div>
<div class="lattice-corner bottom-right"></div>
<div class="flex-1">
<div class="flex items-baseline gap-2 mb-1">
<h2 class="font-title-md text-title-md text-primary">《静夜思》</h2>
<span class="font-label-sm text-label-sm text-on-surface-variant">唐·李白</span>
</div>
<p class="font-body-md text-body-md text-secondary leading-relaxed">
                        「床前明月光，疑是地上霜。」
                    </p>
</div>
<div class="flex items-center h-full pt-1">
<span class="material-symbols-outlined text-primary filled-icon cursor-pointer hover:scale-110 transition-transform">bookmark</span>
</div>
</div>
<!-- Card 2 -->
<div class="xuan-paper-card p-4 group flex items-start justify-between">
<div class="lattice-corner top-left"></div>
<div class="lattice-corner bottom-right"></div>
<div class="flex-1">
<div class="flex items-baseline gap-2 mb-1">
<h2 class="font-title-md text-title-md text-primary">《春晓》</h2>
<span class="font-label-sm text-label-sm text-on-surface-variant">唐·孟浩然</span>
</div>
<p class="font-body-md text-body-md text-secondary leading-relaxed">

</div>
<div class="flex items-center h-full pt-1">
<span class="material-symbols-outlined text-primary filled-icon cursor-pointer">bookmark</span>
</div>
</div>

</div>
<p class="font-body-md text-body-md text-secondary leading-relaxed">

</div>

<span class="material-symbols-outlined text-6xl text-primary transform -rotate-12">ink_pen</span>
</div>
<!-- Micro-interactions Script -->
<script>
        // Simple click interaction for bookmark icons
        document.querySelectorAll('.material-symbols-outlined.filled-icon').forEach(icon => {
            icon.addEventListener('click', function(e) {
                e.stopPropagation();
                if (this.style.fontVariationSettings.includes("'FILL' 1")) {
                    this.style.fontVariationSettings = "'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24";
                    this.style.color = "var(--tw-text-on-surface-variant)";
                    // In a real app, this would trigger a "removed from favorites" toast
                } else {
                    this.style.fontVariationSettings = "'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24";
                    this.style.color = "#761519";
                }
            });
        });

        // Hover effect for cards
        document.querySelectorAll('.xuan-paper-card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.style.transform = "translateY(-2px)";
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = "translateY(0)";
            });
        });
    </script>
