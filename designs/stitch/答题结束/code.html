<body class="font-body-md text-on-surface min-h-screen flex flex-col parchment-texture">

<button class="hover:bg-surface-variant/50 transition-colors p-2 rounded-full active:opacity-70">

</div>
</section>
<!-- Review List Section -->

<div class="flex items-center justify-between mb-2">
<h3 class="font-title-md text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">list_alt</span>
                    题目回顾
                </h3>
<span class="font-label-sm text-on-surface-variant">已答 10 题</span>
</div>
<!-- Bento-style Review Cards -->
<div class="grid grid-cols-1 gap-3">
<!-- Card 1 -->

</div>

<button class="p-2 text-on-surface-variant hover:text-primary transition-colors active:scale-90">

<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                const icon = this.querySelector('.material-symbols-outlined');
                if (icon && icon.textContent === 'bookmark') {
                    const isFilled = icon.style.fontVariationSettings && icon.style.fontVariationSettings.includes("'FILL' 1");
                    icon.style.fontVariationSettings = isFilled ? "'FILL' 0" : "'FILL' 1";
                    if (!isFilled) {
                        this.classList.add('text-primary');
                        this.classList.remove('text-on-surface-variant');
                    } else {
                        this.classList.remove('text-primary');
                        this.classList.add('text-on-surface-variant');
                    }
                }
            });
        });
    </script>
